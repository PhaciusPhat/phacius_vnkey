name: Release

# Publishing a release is a manual, deliberate step: push a version tag
# (e.g. `git tag v0.0.2 && git push origin v0.0.2`) and this workflow builds the
# signed .dmg on a macOS runner and creates the GitHub release with it attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build DMG + publish release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Read app version from Info.plist
        id: version
        run: |
          version="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' apps/macos/Info.plist)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "App version: $version"

      - name: Verify tag matches Info.plist version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Info.plist version ${{ steps.version.outputs.version }} (expected tag v${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build .dmg
        run: bash scripts/package-app.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/phacius_vnkey-${{ steps.version.outputs.version }}.dmg" \
            --title "phacius_vnkey ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --prerelease
