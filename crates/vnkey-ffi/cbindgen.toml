language = "C"
include_guard = "PHACIUS_VNKEY_ENGINE_H"
tab_width = 4
documentation = true

# No [export] prefix: the Rust types are already named Vnkey* (VnkeyConfig,
# VnkeyResult, …). Adding prefix = "Vnkey" here would double it to
# VnkeyVnkey*, which the Swift bridge doesn't reference.

[enum]
# Emit variant constants prefixed with the enum name (VnkeyActionKind_Backspace)
# rather than bare Backspace/Insert, so they don't collide in the C namespace.
prefix_with_name = true
